  <div class="grid md:grid-cols-3 gap-8">

<!-- CARRITO -->
<div id="cart" class="fixed right-0 top-0 w-80 h-full bg-white shadow-lg p-4 hidden">
  <h3 class="font-bold mb-4">Carrito</h3>
  <ul id="cart-items"></ul>
  <p class="mt-4 font-bold">Total: S/ <span id="total">0</span></p>
  <img src="img/qr.jpg" class="my-4">
  <button onclick="checkout()" class="bg-green-500 text-white w-full py-2">Pagar por WhatsApp</button>
</div>

<!-- BOTÓN FLOTANTE -->
<a href="https://wa.me/51974483083" class="fixed bottom-5 right-5 bg-green-500 text-white p-4 rounded-full shadow-lg">💬</a>

<script>
let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  let list = document.getElementById('cart-items');
  let total = 0;
  list.innerHTML = '';

  cart.forEach(item => {
    total += item.price;
    list.innerHTML += `<li>${item.name} - S/ ${item.price}</li>`;
  });

  document.getElementById('total').innerText = total;
}

function checkout(){
  let message = 'Hola quiero comprar:%0A';
  cart.forEach(item => {
    message += `- ${item.name} S/ ${item.price}%0A`;
  });
  window.open(`https://wa.me/51974483083?text=${message}`);
}
</script>
